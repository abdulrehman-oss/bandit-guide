<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bandit :: live terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body {
            background-color: #0a0f0c;
            color: #d1d5db;
            font-family: 'IBM Plex Mono', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #22c55e; margin-bottom: 5px; }
        
        .tab-bar {
            width: 85%;
            display: flex;
            gap: 5px;
            margin-bottom: 0;
            background: #111;
            padding: 5px 5px 0 5px;
            border: 1px solid #333;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
        }
        .tab {
            background-color: #222;
            color: #888;
            border: 1px solid #333;
            border-bottom: none;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            border-radius: 5px 5px 0 0;
        }
        .tab.active {
            background-color: #000;
            color: #22c55e;
            border-color: #22c55e;
        }
        .add-tab-btn {
            background-color: #1a221d;
            color: #22c55e;
            border: 1px dashed #22c55e;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            border-radius: 3px;
            margin-left: auto;
        }
        .add-tab-btn:hover { background-color: #22c55e; color: #000; }

        .term-wrapper {
            width: 85%;
            height: 500px;
            background-color: #000;
            padding: 10px;
            border: 1px solid #22c55e;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            display: none;
        }
        .term-wrapper.active { display: block; }

        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #22c55e;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <h1>> bandit_terminal_</h1>
    <p>Live Web-SSH Terminal Environment.</p>
    
    <div class="tab-bar" id="tabBar">
        <button class="add-tab-btn" onclick="createNewTab()">+ New Tab</button>
    </div>

    <div id="terminalsContainer"></div>

    <a href="index.html" class="back-btn"><- Back to Guide</a>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const BACKEND_URL = "https://bandit-guide-production.up.railway.app";
        
        let tabCount = 0;
        let sessions = {};

        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.term-wrapper').forEach(tw => tw.classList.remove('active'));
            
            document.getElementById(`tabBtn-${id}`).classList.add('active');
            document.getElementById(`termWrap-${id}`).classList.add('active');
            
            if (sessions[id] && sessions[id].term) {
                sessions[id].term.focus();
            }
        }

        function createNewTab() {
            tabCount++;
            const id = tabCount;
            
            const socket = io(BACKEND_URL);

            sessions[id] = {
                id: id,
                socket: socket,
                isConnected: false,
                isPasswordMode: false,
                targetLevel: null,
                inputBuffer: '',
                term: null
            };

            const tabBtn = document.createElement('div');
            tabBtn.className = 'tab';
            tabBtn.id = `tabBtn-${id}`;
            tabBtn.innerHTML = `Terminal ${id}`;
            tabBtn.onclick = () => switchTab(id);
            
            const tabBar = document.getElementById('tabBar');
            tabBar.insertBefore(tabBtn, tabBar.lastElementChild);

            const termWrap = document.createElement('div');
            termWrap.className = 'term-wrapper';
            termWrap.id = `termWrap-${id}`;
            document.getElementById('terminalsContainer').appendChild(termWrap);

            const term = new Terminal({
                cursorBlink: true,
                fontFamily: 'IBM Plex Mono, monospace',
                fontSize: 14,
                cols: 80,
                rows: 24,
                theme: { background: '#000000', foreground: '#00ff00', cursor: '#00ff00' }
            });
            term.open(termWrap);
            sessions[id].term = term;

            // Direct Key Intercept for Vim, Ctrl+C (SIGINT), Ctrl+D (EOF), Tab
            term.attachCustomKeyEventHandler((arg) => {
                if (sessions[id].isConnected) {
                    if (arg.ctrlKey && arg.code === "KeyC" && arg.type === "keydown") {
                        socket.emit('terminal-input', '\x03'); // Send SIGINT
                        return false;
                    }
                    if (arg.ctrlKey && arg.code === "KeyD" && arg.type === "keydown") {
                        socket.emit('terminal-input', '\x04'); // Send EOF
                        return false;
                    }
                }
                return true;
            });

            term.write(`player@linux:~$ `);

            socket.on('terminal-data', (data) => {
                term.write(data);
            });

            socket.on('message', (msg) => {
                term.write(msg);
            });

            socket.on('disconnect', () => {
                term.write('\r\n\r\n[SSH Connection Closed]\r\nplayer@linux:~$ ');
                sessions[id].isConnected = false;
                sessions[id].isPasswordMode = false;
            });

            term.onData(e => handleTerminalInput(id, e));

            switchTab(id);
        }

        function handleTerminalInput(id, e) {
            let session = sessions[id];
            let term = session.term;

            // If connection is live, forward raw bytes directly to backend SSH stream
            if (session.isConnected) {
                session.socket.emit('terminal-input', e);
                return;
            }

            // Local Shell Emulator Mode (Before SSH Login)
            if (e === '\r') {
                let cmd = session.inputBuffer.trim();
                session.inputBuffer = '';

                if (session.isPasswordMode) {
                    term.write('\r\nConnecting to OverTheWire SSH...\r\n');
                    
                    // Emit SSH connection request to backend
                    session.socket.emit('ssh-connect', {
                        host: 'bandit.labs.overthewire.org',
                        port: 2220,
                        username: `bandit${session.targetLevel}`,
                        password: cmd,
                        cols: term.cols,
                        rows: term.rows
                    });
                    
                    session.isConnected = true;
                    session.isPasswordMode = false;
                    document.getElementById(`tabBtn-${id}`).innerHTML = `bandit${session.targetLevel}`;
                } else if (cmd.includes('ssh') && cmd.includes('bandit')) {
                    // Smart Regex match for bandit levels (handles ssh bandit0, ssh bandit0@..., -p 2220, etc)
                    let match = cmd.match(/bandit(\d+)/i);
                    if (match) {
                        session.targetLevel = parseInt(match[1]);
                        session.isPasswordMode = true;
                        term.write(`\r\nbandit${session.targetLevel}@bandit.labs.overthewire.org's password: `);
                    } else {
                        term.write('\r\nInvalid target. Example: ssh bandit0@bandit.labs.overthewire.org -p 2220\r\nplayer@linux:~$ ');
                    }
                } else if (cmd === 'clear') {
                    term.clear();
                    term.write('player@linux:~$ ');
                } else {
                    term.write('\r\nUse "ssh bandit0@bandit.labs.overthewire.org -p 2220" to connect.\r\nplayer@linux:~$ ');
                }
            } else if (e === '\u007F') { // Backspace handling
                if (session.inputBuffer.length > 0) {
                    session.inputBuffer = session.inputBuffer.slice(0, -1);
                    if (!session.isPasswordMode) term.write('\b \b');
                }
            } else {
                session.inputBuffer += e;
                if (!session.isPasswordMode) term.write(e);
            }
        }

        createNewTab();
    </script>
</body>
</html>
